name: Build Server and Android APK

on:
  workflow_dispatch:
    inputs:
      service_url:
        description: "HTTPS service URL for the Android shell"
        required: false
        type: string
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-server:
    name: Linux AMD64 Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Build frontend
        run: |
          pnpm --dir web install --frozen-lockfile
          pnpm --dir web run build
      - name: Build Linux AMD64 binary
        run: |
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/family-english-linux-amd64 ./cmd/server
      - uses: actions/upload-artifact@v4
        with:
          name: family-english-linux-amd64
          path: dist/family-english-linux-amd64

  build-apk:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build debug APK
        working-directory: android-shell
        env:
          SERVICE_URL: "${{ inputs.service_url || vars.SERVICE_URL || 'https://example.com/' }}"
        run: |
          gradle --no-daemon --stacktrace :app:assembleDebug -PSERVICE_URL="$SERVICE_URL"
      - name: Rename APK
        run: |
          mkdir -p apk
          cp android-shell/app/build/outputs/apk/debug/app-debug.apk apk/family-english-debug.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-english-debug-apk
          path: apk/family-english-debug.apk
