name: Build Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      service_url:
        description: "HTTPS service URL for the Android shell"
        required: true
        type: string

permissions:
  contents: read

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Build release APK
        working-directory: android-shell
        env:
          SERVICE_URL: "${{ inputs.service_url || vars.SERVICE_URL }}"
        run: |
          test -n "$SERVICE_URL"
          gradle --no-daemon assembleRelease -PSERVICE_URL="$SERVICE_URL"
      - uses: actions/upload-artifact@v4
        with:
          name: family-english-android-apk
          path: android-shell/app/build/outputs/apk/release/*.apk
