name: Build release artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      service_url:
        description: "HTTPS service URL for the Android shell"
        required: true
        type: string

permissions:
  contents: read

jobs:
  server:
    name: Server (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, runner: ubuntu-latest }
          - { goos: linux, goarch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: web/package-lock.json }
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: npm ci --prefix web
      - run: npm run build --prefix web
      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o dist/family-english-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server
      - uses: actions/upload-artifact@v4
        with: { name: family-english-${{ matrix.goos }}-${{ matrix.goarch }}, path: dist/* }
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: "8.11.1" }
      - name: Build release APK
        working-directory: android-shell
        env:
          SERVICE_URL: ${{ inputs.service_url || vars.SERVICE_URL }}
        run: |
          test -n "$SERVICE_URL"
          gradle --no-daemon assembleRelease -PSERVICE_URL="$SERVICE_URL"
      - uses: actions/upload-artifact@v4
        with: { name: family-english-android-apk, path: android-shell/app/build/outputs/apk/release/*.apk }
